  <h2>Our Contact Form</h2>
  <form action="">
    <fieldset>
     <legend>Sends Us A Message</legend>  
     <br> 
     <p>
     <label for="name">Name:</label>
     <input type="text" name="name" id="name" placeholder="your name" required>
    </p>
    <p>
     <label for="email">Email:</label>
     <input type="text" name="email" id="email" placeholder="your email" required>
    </p>
    <p>
        <label for="pass">Password:</label>
        <input type="password" name="pass" id="pass" placeholder="your password" required>
    </p>
    <p>
        <label for="num">Phonenumber:</label>
        <input type="tel" name="num" id="num" placeholder="your email" required pattern="[0-9]{3}[0-9]{3}[0-9]{4}">
    </p>
    <label for="msg">Your Message:</label>
    <p>
        <textarea  name="msg" id="msg" cols="30" rows="10" placeholder="Type your message here" required ></textarea>
    </p>
    </fieldset>
    <br>
    <button type="submit">Submit</button>
    <button type="reset">Reset</button>
  </form>
